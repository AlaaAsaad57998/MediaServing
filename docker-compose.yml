services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env.development
    environment:
      NODE_ENV: development
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      REDIS_URL: redis://redis:6379
      NODE_OPTIONS: --max-old-space-size=2048
      VIDEO_PREPROCESS_CONCURRENCY: "4"
      STORY_HLS_TRANSCODE_CONCURRENCY: "3"
      PREVIEW_DURATION_SECONDS: "6"
      PREVIEW_VARIANT_TRANSFORM: w_400,h_600,f_mp4,vc_h264,q_65,c_fill
      FFMPEG_X264_PRESET: superfast
      FFMPEG_X265_PRESET: superfast
      STORY_HLS_X264_PRESET: superfast
      STORY_HLS_SEGMENT_SECONDS: "4"
      FFMPEG_THREADS: "2"
      FFMPEG_VP9_DEADLINE: realtime
      FFMPEG_VP9_CPU_USED: "6"
    depends_on:
      - minio
      - redis
    volumes:
      - ./src:/app/src
      - ./test.html:/app/test.html:ro
      - ./compare.html:/app/compare.html:ro
      - ./.env.development:/app/.env.development:ro
    command: node --watch src/index.js
    mem_reservation: 768m
    mem_limit: 2g
    cpus: "2.00"
    shm_size: 512m
    pids_limit: 400
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    mem_reservation: 256m
    mem_limit: 512m
    cpus: "0.50"
    pids_limit: 100
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    mem_reservation: 64m
    mem_limit: 128m
    cpus: "0.25"
    pids_limit: 50
    restart: unless-stopped

volumes:
  minio-data:
  redis-data:
