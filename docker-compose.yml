services:
  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    mem_reservation: 256m
    mem_limit: 512m
    cpus: "0.50"
    pids_limit: 100
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    mem_reservation: 64m
    mem_limit: 128m
    cpus: "0.25"
    pids_limit: 50
    restart: unless-stopped

volumes:
  minio-data:
  redis-data:
