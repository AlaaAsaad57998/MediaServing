services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env.development
    environment:
      NODE_ENV: development
      S3_ENDPOINT: http://minio:9000
      S3_ACCESS_KEY: minioadmin
      S3_SECRET_KEY: minioadmin
      REDIS_URL: redis://redis:6379
    depends_on:
      - minio
      - redis
    volumes:
      - ./src:/app/src
      - ./test.html:/app/test.html:ro
      - ./compare.html:/app/compare.html:ro
      - ./.env.development:/app/.env.development:ro
    command: node --watch src/index.js
    restart: unless-stopped

  minio:
    image: minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    volumes:
      - minio-data:/data
    mem_reservation: 256m
    mem_limit: 512m
    cpus: "0.50"
    pids_limit: 100
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    mem_reservation: 64m
    mem_limit: 128m
    cpus: "0.25"
    pids_limit: 50
    restart: unless-stopped

volumes:
  minio-data:
  redis-data:
