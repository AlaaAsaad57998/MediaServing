<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MediaServing Test Panel</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: "Segoe UI", Tahoma, sans-serif;
        background: linear-gradient(180deg, #0a101d 0%, #101a2f 100%);
        color: #dbe6ff;
      }
      .container {
        max-width: 1080px;
        margin: 0 auto;
        padding: 24px;
      }
      h1 {
        margin: 0 0 14px;
        color: #7dd3fc;
      }
      .sub {
        color: #8ea0c7;
        margin-bottom: 18px;
      }
      .card {
        background: #121e33;
        border: 1px solid #23365f;
        border-radius: 12px;
        padding: 16px;
        margin-bottom: 16px;
      }
      h2 {
        font-size: 18px;
        margin: 0 0 12px;
        color: #9ad2ff;
      }
      .grid {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
      }
      @media (max-width: 820px) {
        .grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }
      @media (max-width: 520px) {
        .grid {
          grid-template-columns: 1fr;
        }
      }
      label {
        display: block;
        font-size: 12px;
        color: #9bb2df;
        margin-bottom: 4px;
      }
      input,
      select,
      button,
      textarea {
        width: 100%;
        border-radius: 8px;
        border: 1px solid #2c467a;
        background: #0d1527;
        color: #e6efff;
        padding: 8px 10px;
        font-size: 14px;
      }
      textarea {
        min-height: 70px;
      }
      button {
        cursor: pointer;
        background: #1d4ed8;
        border-color: #2f64f0;
        font-weight: 600;
      }
      button:disabled {
        opacity: 0.6;
        cursor: not-allowed;
      }
      .row {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }
      .row > * {
        flex: 1;
        min-width: 190px;
      }
      .result {
        margin-top: 10px;
        white-space: pre-wrap;
        word-break: break-word;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        background: #0b1222;
        border: 1px solid #20345d;
        padding: 10px;
        border-radius: 8px;
        display: none;
      }
      .result.show {
        display: block;
      }
      .url {
        margin-top: 8px;
        font-size: 12px;
        color: #7dd3fc;
        word-break: break-all;
      }
      .preview {
        margin-top: 10px;
      }
      .preview img,
      .preview video {
        width: 100%;
        max-height: 420px;
        border-radius: 10px;
        border: 1px solid #2b4679;
        background: #000;
      }
      .meta {
        font-size: 12px;
        color: #8aa0c8;
        margin-top: 6px;
      }
      .pill {
        display: inline-block;
        background: #102140;
        border: 1px solid #2f4f8f;
        color: #9cc0ff;
        padding: 4px 8px;
        border-radius: 999px;
        margin-right: 6px;
        font-size: 12px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>MediaServing Test Panel</h1>
      <div class="sub">
        Images use Cloudinary-style transforms, while videos use target
        variants:
        <code>/video/upload/{public_id}?target=preview|snapshot</code>
      </div>

      <div class="card">
        <div class="row">
          <div>
            <span class="pill">Base URL</span>
            <div id="baseUrl"></div>
          </div>
          <div>
            <span class="pill">API Key</span>
            <div id="apiStatus"></div>
          </div>
          <div>
            <button onclick="checkHealth()">Health Check</button>
          </div>
        </div>
        <div class="result" id="healthResult"></div>
      </div>

      <div class="card">
        <h2>Upload Image</h2>
        <div class="row">
          <div>
            <label>Image file</label>
            <input id="imageUploadFile" type="file" accept="image/*" />
          </div>
          <div>
            <label>Folder (optional)</label>
            <input
              id="imageUploadFolder"
              type="text"
              placeholder="e.g. avatars"
            />
          </div>
        </div>
        <button id="uploadImageBtn" onclick="uploadMedia('image')">
          Upload Image
        </button>
        <div class="result" id="uploadImageResult"></div>
      </div>

      <div class="card">
        <h2>Transform Image</h2>
        <div class="grid">
          <div>
            <label>Image path/public_id</label>
            <input
              id="imgPath"
              type="text"
              placeholder="e.g. avatars/photo.jpg"
            />
          </div>
          <div>
            <label>w</label>
            <input
              id="imgW"
              type="number"
              min="1"
              max="10000"
              placeholder="800"
            />
          </div>
          <div>
            <label>h</label>
            <input
              id="imgH"
              type="number"
              min="1"
              max="10000"
              placeholder="600"
            />
          </div>
          <div>
            <label>c</label>
            <select id="imgC">
              <option value="">(none)</option>
              <option value="fill">fill</option>
              <option value="pad">pad</option>
              <option value="fit">fit</option>
              <option value="scale">scale</option>
              <option value="crop">crop</option>
            </select>
          </div>
          <div>
            <label>b</label>
            <select id="imgB">
              <option value="">(none)</option>
              <option value="auto">auto</option>
              <option value="000000">000000</option>
              <option value="ffffff">ffffff</option>
            </select>
          </div>
          <div>
            <label>f</label>
            <select id="imgF">
              <option value="">(none)</option>
              <option value="auto">auto</option>
              <option value="webp">webp</option>
              <option value="avif">avif</option>
              <option value="jpeg">jpeg</option>
              <option value="png">png</option>
            </select>
          </div>
          <div>
            <label>q</label>
            <input id="imgQ" type="text" placeholder="auto:good or 80" />
          </div>
          <div>
            <label>fl</label>
            <select id="imgLossy">
              <option value="">(none)</option>
              <option value="lossy">lossy</option>
            </select>
          </div>
        </div>
        <div class="url" id="imgUrlPreview">-</div>
        <button id="transformImageBtn" onclick="transformMedia('image')">
          Transform Image
        </button>
        <div class="result" id="transformImageResult"></div>
        <div class="preview" id="imagePreviewWrap" style="display: none">
          <img id="imagePreview" alt="image preview" />
          <div class="meta" id="imageMeta"></div>
        </div>
      </div>

      <div class="card">
        <h2>Upload Video</h2>
        <div class="row">
          <div>
            <label>Video file</label>
            <input id="videoUploadFile" type="file" accept="video/*" />
          </div>
          <div>
            <label>Folder (optional)</label>
            <input
              id="videoUploadFolder"
              type="text"
              placeholder="e.g. demos"
            />
          </div>
        </div>
        <button id="uploadVideoBtn" onclick="uploadMedia('video')">
          Upload Video
        </button>
        <div class="result" id="uploadVideoResult"></div>
        <div class="url" id="videoInstances">-</div>
      </div>

      <div class="card">
        <h2>Transform Video</h2>
        <div class="grid">
          <div>
            <label>Video path/public_id</label>
            <input id="vidPath" type="text" placeholder="e.g. demos/clip.mp4" />
          </div>
          <div>
            <label>target</label>
            <select id="vidTarget">
              <option value="">full</option>
              <option value="preview">preview</option>
              <option value="snapshot">snapshot</option>
            </select>
          </div>
        </div>
        <div class="url" id="vidUrlPreview">-</div>
        <button id="transformVideoBtn" onclick="transformMedia('video')">
          Transform Video
        </button>
        <div class="result" id="transformVideoResult"></div>
        <div class="preview" id="videoPreviewWrap" style="display: none">
          <video id="videoPreview" controls playsinline></video>
          <img
            id="videoImagePreview"
            alt="video snapshot preview"
            style="display: none"
          />
          <div class="meta" id="videoMeta"></div>
        </div>
      </div>
    </div>

    <script>
      window.__TEST_API_KEY__ = "__TEST_API_KEY__";

      function getBase() {
        return window.location.origin.replace(/\/+$/, "");
      }

      function getApiKey() {
        return window.__TEST_API_KEY__ || "";
      }

      function showResult(id, text) {
        const el = document.getElementById(id);
        el.textContent = text;
        el.classList.add("show");
      }

      function renderVideoInstances(variants) {
        const el = document.getElementById("videoInstances");
        if (!variants) {
          el.textContent = "-";
          return;
        }

        const fullPath = variants.full || variants.video || "";
        const previewPath = variants.preview || "";
        const snapshotPath = variants.snapshot || "";

        const fullUrl = fullPath ? getBase() + fullPath : "-";
        const previewUrl = previewPath ? getBase() + previewPath : "-";
        const snapshotUrl = snapshotPath ? getBase() + snapshotPath : "-";

        el.innerHTML =
          "Instances after upload:" +
          "<br>1. full (video/webm): " +
          fullUrl +
          "<br>2. preview (video/webm, 10s): " +
          previewUrl +
          "<br>3. snapshot (image/webp): " +
          snapshotUrl;
      }

      function buildMediaUrl(resourceType, transformations, publicId) {
        if (!publicId) return null;
        const base = getBase();
        if (transformations) {
          return (
            base +
            "/" +
            resourceType +
            "/upload/" +
            transformations +
            "/" +
            publicId
          );
        }
        return base + "/" + resourceType + "/upload/" + publicId;
      }

      function buildVideoTargetUrl(publicId) {
        if (!publicId) return null;
        const target = document.getElementById("vidTarget").value;
        const base = getBase() + "/video/upload/" + publicId;
        return target ? base + "?target=" + encodeURIComponent(target) : base;
      }

      function buildImageTransform() {
        const parts = [];
        const w = document.getElementById("imgW").value.trim();
        const h = document.getElementById("imgH").value.trim();
        const c = document.getElementById("imgC").value;
        const b = document.getElementById("imgB").value;
        const f = document.getElementById("imgF").value;
        const q = document.getElementById("imgQ").value.trim();
        const lossy = document.getElementById("imgLossy").value;

        if (w) parts.push("w_" + w);
        if (h) parts.push("h_" + h);
        if (c) parts.push("c_" + c);
        if (b) parts.push("b_" + b);
        if (f) parts.push("f_" + f);
        if (q) parts.push("q_" + q);
        if (lossy) parts.push("fl_" + lossy);

        return parts.join(",");
      }

      function refreshPreviews() {
        const imgPath = document.getElementById("imgPath").value.trim();
        const vidPath = document.getElementById("vidPath").value.trim();

        document.getElementById("imgUrlPreview").textContent =
          buildMediaUrl("image", buildImageTransform(), imgPath) || "-";

        document.getElementById("vidUrlPreview").textContent =
          buildVideoTargetUrl(vidPath) || "-";
      }

      async function checkHealth() {
        try {
          const res = await fetch(getBase() + "/health");
          const data = await res.json();
          showResult("healthResult", "OK " + JSON.stringify(data));
        } catch (err) {
          showResult("healthResult", "ERROR " + err.message);
        }
      }

      async function uploadMedia(type) {
        const isVideo = type === "video";
        const fileInput = document.getElementById(
          isVideo ? "videoUploadFile" : "imageUploadFile",
        );
        const folderInput = document.getElementById(
          isVideo ? "videoUploadFolder" : "imageUploadFolder",
        );
        const resultId = isVideo ? "uploadVideoResult" : "uploadImageResult";
        const btn = document.getElementById(
          isVideo ? "uploadVideoBtn" : "uploadImageBtn",
        );

        if (!fileInput.files.length) {
          showResult(resultId, "Please select a file");
          return;
        }

        const form = new FormData();
        form.append("file", fileInput.files[0]);
        const folder = folderInput.value.trim();
        if (folder) form.append("folder", folder);

        btn.disabled = true;
        btn.textContent = "Uploading...";

        try {
          const res = await fetch(getBase() + "/upload", {
            method: "POST",
            headers: { "X-API-Key": getApiKey() },
            body: form,
          });

          const data = await res.json();
          showResult(
            resultId,
            "Status: " + res.status + "\n" + JSON.stringify(data, null, 2),
          );

          if (res.ok && data.key) {
            const publicId = data.key.replace(/^originals\//, "");
            if (isVideo) {
              document.getElementById("vidPath").value = publicId;
              renderVideoInstances(data.variants);
            } else {
              document.getElementById("imgPath").value = publicId;
            }
            refreshPreviews();
          }
        } catch (err) {
          showResult(resultId, "Error: " + err.message);
        } finally {
          btn.disabled = false;
          btn.textContent = isVideo ? "Upload Video" : "Upload Image";
        }
      }

      async function transformMedia(type) {
        const isVideo = type === "video";
        const publicId = document
          .getElementById(isVideo ? "vidPath" : "imgPath")
          .value.trim();

        if (!publicId) {
          showResult(
            isVideo ? "transformVideoResult" : "transformImageResult",
            "Please provide path/public_id first",
          );
          return;
        }

        const url = isVideo
          ? buildVideoTargetUrl(publicId)
          : buildMediaUrl("image", buildImageTransform(), publicId);
        const resultId = isVideo
          ? "transformVideoResult"
          : "transformImageResult";
        const btn = document.getElementById(
          isVideo ? "transformVideoBtn" : "transformImageBtn",
        );

        btn.disabled = true;
        btn.textContent = "Fetching...";

        try {
          const res = await fetch(url, {
            headers: { "X-API-Key": getApiKey() },
          });

          if (!res.ok) {
            const errorBody = await res.text();
            showResult(resultId, "Status: " + res.status + "\n" + errorBody);
            return;
          }

          const cache = res.headers.get("X-Cache") || "-";
          const ct = res.headers.get("Content-Type") || "-";
          const blob = await res.blob();

          showResult(
            resultId,
            "Status: " +
              res.status +
              "\nType: " +
              ct +
              "\nCache: " +
              cache +
              "\nSize: " +
              (blob.size / 1024).toFixed(1) +
              " KB\nURL: " +
              url,
          );

          if (isVideo) {
            const isImage = (ct || "").toLowerCase().startsWith("image/");
            const video = document.getElementById("videoPreview");
            const image = document.getElementById("videoImagePreview");
            if (isImage) {
              video.style.display = "none";
              image.src = URL.createObjectURL(blob);
              image.style.display = "block";
            } else {
              image.style.display = "none";
              video.src = URL.createObjectURL(blob);
              video.style.display = "block";
            }
            document.getElementById("videoMeta").textContent =
              ct +
              " | " +
              (blob.size / 1024).toFixed(1) +
              " KB | Cache: " +
              cache;
            document.getElementById("videoPreviewWrap").style.display = "block";
          } else {
            const img = document.getElementById("imagePreview");
            img.onload = function () {
              document.getElementById("imageMeta").textContent =
                this.naturalWidth +
                "x" +
                this.naturalHeight +
                " | " +
                ct +
                " | " +
                (blob.size / 1024).toFixed(1) +
                " KB | Cache: " +
                cache;
            };
            img.src = URL.createObjectURL(blob);
            document.getElementById("imagePreviewWrap").style.display = "block";
          }
        } catch (err) {
          showResult(resultId, "Error: " + err.message);
        } finally {
          btn.disabled = false;
          btn.textContent = isVideo ? "Transform Video" : "Transform Image";
        }
      }

      function bindPreviewEvents() {
        [
          "imgPath",
          "imgW",
          "imgH",
          "imgC",
          "imgB",
          "imgF",
          "imgQ",
          "imgLossy",
          "vidPath",
          "vidTarget",
        ].forEach((id) => {
          const el = document.getElementById(id);
          if (!el) return;
          el.addEventListener("input", refreshPreviews);
          el.addEventListener("change", refreshPreviews);
        });
      }

      (function init() {
        document.getElementById("baseUrl").textContent = getBase();
        document.getElementById("apiStatus").textContent = getApiKey()
          ? "Loaded from env"
          : "Missing in env";
        bindPreviewEvents();
        refreshPreviews();
        checkHealth();
      })();
    </script>
  </body>
</html>
