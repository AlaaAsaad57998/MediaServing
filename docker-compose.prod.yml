# Production deployment
# Prerequisites: install the Loki Docker logging driver on the host before deploying.
#   docker plugin install grafana/loki-docker-driver:latest --alias loki --grant-all-permissions

x-loki-options: &loki-options
  loki-url: "${LOKI_URL:-http://127.0.0.1:3100/loki/api/v1/push}"
  max-size: "10m"
  max-file: "3"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: media-serving:latest
    restart: unless-stopped
    stop_grace_period: 30s

    env_file: .env.production

    environment:
      NODE_ENV: production
      NODE_OPTIONS: --max-old-space-size=2048
      VIDEO_PREPROCESS_CONCURRENCY: "4"
      STORY_HLS_TRANSCODE_CONCURRENCY: "3"
      PREVIEW_DURATION_SECONDS: "6"
      PREVIEW_VARIANT_TRANSFORM: w_400,h_600,f_mp4,vc_h264,q_65,c_fill
      FFMPEG_X264_PRESET: superfast
      FFMPEG_X265_PRESET: superfast
      STORY_HLS_X264_PRESET: superfast
      STORY_HLS_SEGMENT_SECONDS: "4"
      FFMPEG_THREADS: "2"
      FFMPEG_VP9_DEADLINE: realtime
      FFMPEG_VP9_CPU_USED: "6"
      # Loki query URL reachable from within this container.
      # host.docker.internal resolves to the Docker host via the extra_hosts entry below.
      # Used only when GRAFANA_URL / GRAFANA_TOKEN are not set.
      LOKI_QUERY_URL: "${LOKI_QUERY_URL:-http://host.docker.internal:3100}"

      # Grafana datasource proxy — preferred over direct Loki.
      # Set both vars in .env.production to route all Loki queries through
      # Grafana instead of hitting Loki directly.
      #   GRAFANA_URL=http://host.docker.internal:3001
      #   GRAFANA_TOKEN=glsa_...
      GRAFANA_URL: "${GRAFANA_URL:-}"
      GRAFANA_TOKEN: "${GRAFANA_TOKEN:-}"
      # If the Loki datasource UID inside Grafana is known, set it here to skip
      # the automatic discovery call on first use.
      GRAFANA_LOKI_UID: "P8E80F9AEF21F6940"

    # Allow the container to reach Loki running on the Docker host (port 3100).
    extra_hosts:
      - "host.docker.internal:host-gateway"

    logging:
      driver: loki
      options:
        <<: *loki-options
        loki-external-labels: "container_name={{.Name}},env=production,stack=media-serving,role=api"

    # ADMIN: ensure port 4001 is open in the firewall / security-group rules.
    ports:
      - "4001:3000"

    mem_reservation: 1g
    mem_limit: 3g
    cpus: "1.00"
    shm_size: 1g
    pids_limit: 512

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
