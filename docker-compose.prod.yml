# Production deployment
# Prerequisites: install the Loki Docker logging driver on the host before deploying.
#   docker plugin install grafana/loki-docker-driver:latest --alias loki --grant-all-permissions

x-loki-options: &loki-options
  loki-url: "${LOKI_URL:-http://127.0.0.1:3100/loki/api/v1/push}"
  max-size: "10m"
  max-file: "3"

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: media-serving:latest
    restart: unless-stopped
    stop_grace_period: 30s

    env_file: .env.production

    environment:
      NODE_ENV: production
      NODE_OPTIONS: --max-old-space-size=2048
      VIDEO_PREPROCESS_CONCURRENCY: "4"
      STORY_HLS_TRANSCODE_CONCURRENCY: "3"
      PREVIEW_DURATION_SECONDS: "6"
      PREVIEW_VARIANT_TRANSFORM: w_400,h_600,f_mp4,vc_h264,q_65,c_fill
      FFMPEG_X264_PRESET: superfast
      FFMPEG_X265_PRESET: superfast
      STORY_HLS_X264_PRESET: superfast
      STORY_HLS_SEGMENT_SECONDS: "4"
      FFMPEG_THREADS: "2"
      FFMPEG_VP9_DEADLINE: realtime
      FFMPEG_VP9_CPU_USED: "6"

    logging:
      driver: loki
      options:
        <<: *loki-options
        loki-external-labels: "container_name={{.Name}},env=production,stack=media-serving,role=api"

    # ADMIN: ensure port 4001 is open in the firewall / security-group rules.
    ports:
      - "4001:3000"

    mem_reservation: 1g
    mem_limit: 3g
    cpus: "1.00"
    shm_size: 1g
    pids_limit: 512

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
