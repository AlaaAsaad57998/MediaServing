# Production deployment

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: media-serving:latest
    restart: unless-stopped

    env_file: .env.production

    # ADMIN: ensure port 4001 is open in the firewall / security-group rules.
    ports:
      - "4001:3000"

    mem_reservation: 256m
    mem_limit: 512m
    cpus: "1.00"
    pids_limit: 200

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
