# Production deployment
#
# Prerequisites on the server:
#   1. Create .env.production next to this file (it is gitignored — never commit it).
#      Copy .env.production from the repo template and fill in all real values.
#   2. docker compose -f docker-compose.prod.yml up -d --build
#
# External services (not managed here — configure via .env.production):
#   • AWS S3 (S3_ENDPOINT, S3_ACCESS_KEY, S3_SECRET_KEY, S3_REGION, S3_BUCKET)
#   • Redis   (REDIS_URL, REDIS_USERNAME, REDIS_PASS)

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: media-serving:latest
    restart: unless-stopped

    # All secrets come from .env.production on the host — never baked into the image.
    env_file: .env.production

    ports:
      - "3000:3000"

    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
